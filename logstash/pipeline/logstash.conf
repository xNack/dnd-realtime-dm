# =============================================================================
#  LOGSTASH — Ingestion verso Elasticsearch
#
#  INPUT : legge gli eventi GIÀ arricchiti dal topic Kafka "dnd-enriched"
#  FILTER: interpreta il JSON e imposta il campo data
#  OUTPUT: INVIA ogni evento a Elasticsearch (che poi lo indicizza), indice "dnd-enriched"
#
#  NB: Logstash fa l'INGESTION (consegna i dati); l'INDICIZZAZIONE vera e propria
#      la esegue Elasticsearch.
# =============================================================================

# INPUT = da dove Logstash prende i dati. Qui: Kafka, topic "dnd-enriched"
# (gli eventi GIÀ arricchiti da Spark).
input {
  kafka {
    bootstrap_servers => "kafka:9092"   # indirizzo del broker Kafka
    topics => ["dnd-enriched"]          # il topic da cui leggere
    group_id => "logstash-dnd"          # nome del "consumer group": Kafka ricorda
                                        #   fin dove questo gruppo ha già letto (offset)
    auto_offset_reset => "earliest"     # se è la prima volta, leggi dall'inizio del topic
    codec => "json"                     # ogni messaggio è testo JSON: trasformalo in campi
  }
}

# FILTER = trasformazioni sui dati prima di salvarli.
filter {
  # Spark mette nell'evento un campo "ingest_ts" (data/ora di elaborazione).
  # Qui lo copiamo nel campo speciale "@timestamp", che è quello che Kibana usa
  # come asse del tempo nei grafici e in Discover.
  date {
    match => ["ingest_ts", "ISO8601"]   # formato della data in arrivo
    target => "@timestamp"              # campo di destinazione
  }
  # Togliamo due campi tecnici aggiunti in automatico da Logstash che in
  # dashboard non servono e farebbero solo confusione.
  mutate {
    remove_field => ["event", "@version"]
  }
}

# OUTPUT = dove Logstash manda i dati finiti.
output {
  # 1) Su Elasticsearch, nell'indice "dnd-enriched" (da cui legge Kibana).
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "dnd-enriched"
  }
  # 2) Anche a video, così durante la demo vediamo passare gli eventi nel terminale.
  stdout { codec => rubydebug }
}
